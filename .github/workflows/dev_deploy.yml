name: Planup Dev CI/CD (Blue-Green)

on:
  push:
    branches: [ develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test --no-daemon --parallel --build-cache

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            build/libs/*.jar
            Dockerfile
            docker-compose.yml
            monitoring/
            nginx/
            scripts/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Blue-Green Deploy to EC2
        shell: bash
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          REST_API_KEY: ${{ secrets.REST_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          APP_FRONTEND_URL: ${{ secrets.APP_FRONTEND_URL }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          echo "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem

          # .env 파일 생성
          cat <<EOF > .env
          # 데이터베이스 설정
          DB_HOST=${DB_HOST}
          DB_PORT=${DB_PORT}
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}

          # Redis 설정
          SPRING_DATA_REDIS_HOST=redis
          SPRING_DATA_REDIS_PORT=6379

          # JWT 설정
          JWT_SECRET=${JWT_SECRET}

          # AWS 설정
          AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
          AWS_SECRET_KEY=${AWS_SECRET_KEY}
          AWS_S3_BUCKET=${AWS_S3_BUCKET}

          # 메일 설정
          MAIL_HOST=smtp.gmail.com
          MAIL_USERNAME=${MAIL_USERNAME}
          MAIL_PASSWORD=${MAIL_PASSWORD}

          # 카카오 OAuth
          REST_API_KEY=${REST_API_KEY}
          KAKAO_REDIRECT_URI=http://${EC2_HOST}/test/kakao/callback

          # Google Gemini
          GOOGLE_API_KEY=${GOOGLE_API_KEY}

          # 애플리케이션 설정
          APP_DOMAIN=http://${EC2_HOST}
          APP_FRONTEND_URL=http://localhost:3000
          APP_FRONTEND_URLS=http://localhost:3000,http://localhost:3001,http://${EC2_HOST}:3000
          SPRING_PROFILES_ACTIVE=dev

          # Grafana 설정
          GRAFANA_ADMIN_USER=admin
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}

          # EC2 Username (for deploy script)
          EC2_USERNAME=${EC2_USERNAME}
          EOF

          # 배포 디렉토리 생성
          ssh -i private_key.pem -o StrictHostKeyChecking=no ${EC2_USERNAME}@${EC2_HOST} \
            "mkdir -p /home/${EC2_USERNAME}/planup/build/libs /home/${EC2_USERNAME}/planup/monitoring /home/${EC2_USERNAME}/planup/nginx/conf.d /home/${EC2_USERNAME}/planup/scripts"

          # 파일 전송 전에 디스크 정리 (컨테이너는 유지)
          echo "=== Cleaning up disk space before transfer ==="
          ssh -i private_key.pem -o StrictHostKeyChecking=no ${EC2_USERNAME}@${EC2_HOST} << 'CLEANUP'
            cd /home/${USER}/planup

            echo "Current disk usage:"
            df -h

            echo "Cleaning unused Docker resources (keeping running containers)..."
            docker image prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true

            echo "Removing old build files..."
            rm -rf /home/${USER}/planup/build/libs/*.jar 2>/dev/null || true

            echo "Disk usage after cleanup:"
            df -h
          CLEANUP

          # 파일 전송
          echo "=== Transferring files to EC2 ==="

          rsync -avz -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
            Dockerfile ${EC2_USERNAME}@${EC2_HOST}:/home/${EC2_USERNAME}/planup/

          rsync -avz -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
            docker-compose.yml ${EC2_USERNAME}@${EC2_HOST}:/home/${EC2_USERNAME}/planup/

          rsync -avz -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
            .env ${EC2_USERNAME}@${EC2_HOST}:/home/${EC2_USERNAME}/planup/

          rsync -avz -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
            build/libs/*.jar ${EC2_USERNAME}@${EC2_HOST}:/home/${EC2_USERNAME}/planup/build/libs/

          rsync -avz -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
            monitoring/ ${EC2_USERNAME}@${EC2_HOST}:/home/${EC2_USERNAME}/planup/monitoring/

          rsync -avz -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
            nginx/ ${EC2_USERNAME}@${EC2_HOST}:/home/${EC2_USERNAME}/planup/nginx/

          rsync -avz -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
            scripts/ ${EC2_USERNAME}@${EC2_HOST}:/home/${EC2_USERNAME}/planup/scripts/

          # Blue-Green 배포 스크립트 실행
          echo "=== Starting Blue-Green Deployment ==="
          ssh -i private_key.pem -o StrictHostKeyChecking=no ${EC2_USERNAME}@${EC2_HOST} \
            "chmod +x /home/${EC2_USERNAME}/planup/scripts/deploy.sh && EC2_USERNAME=${EC2_USERNAME} /home/${EC2_USERNAME}/planup/scripts/deploy.sh"

          # 최종 상태 확인
          echo "=== Final Health Check ==="
          ssh -i private_key.pem -o StrictHostKeyChecking=no ${EC2_USERNAME}@${EC2_HOST} \
            "curl -sf http://localhost/actuator/health && echo '' && echo '✓ Deployment successful!'"

          rm -f private_key.pem .env
